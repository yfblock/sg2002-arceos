# Architecture identifier.
arch = "riscv64"                                 # str
# Platform identifier.
platform = "sg2002"                         # str
# Platform package.
package = "axplat-riscv64-sg2002"                           # str

#
# Platform configs
#
[plat]
# Maximum number of CPUs. For platforms that do not support runtime CPU number
# detection, it's also the number of CPUs to boot.
max-cpu-num = 1                 # uint
# Base address of the whole physical memory.
phys-memory-base = 0x8000_0000            # uint
# Size of the whole physical memory. (256M)
phys-memory-size = 0x1000_0000   # uint
# Base physical address of the kernel image.
kernel-base-paddr = 0x8008_0000   # uint
# Base virtual address of the kernel image.
kernel-base-vaddr = "0x8008_0000"     # uint
# Linear mapping offset, for quick conversions between physical and virtual
# addresses.
phys-virt-offset = "0x0"      # uint
# Offset of bus address and phys address. some boards, the bus address is
# different from the physical address.
phys-bus-offset = 0                             # uint
# Kernel address space base.
kernel-aspace-base = "0x0"    # uint
# Kernel address space size.
kernel-aspace-size = "0x0000_003f_ffff_f000"    # uint
# Stack size on bootstrapping.
boot-stack-size = 0x40000                       # uint

#
# Device specifications
#
[devices]
# MMIO regions with format (`base_paddr`, `size`).
mmio-regions = []           # [(uint, uint)]
# VirtIO MMIO regions with format (`base_paddr`, `size`).
virtio-mmio-regions = []    # [(uint, uint)]
# Base physical address of the PCIe ECAM space.
pci-ecam-base = 0           # uint
# End PCI bus number.
pci-bus-end = 0             # uint
# PCI device memory ranges.
pci-ranges = []             # [(uint, uint)]
# plic0: interrupt-controller@70000000 {
#     riscv,ndev = <101>;
#     riscv,max-priority = <0x07>;
#     reg-names = "control";
#     reg = <0x00 0x70000000 0x00 0x4000000>;
#     interrupts-extended = <&cpu0_intc 0xffffffff &cpu0_intc 0x09>;
#     interrupt-controller;
#     compatible = "riscv,plic0";
#     #interrupt-cells = <0x02>;
#     #address-cells = <0x00>;
# };
plic-paddr = 0x7000_0000            # uint
# Timer interrupt frequency in Hz.
# timer-frequency = 10_000_000        # uint
timer-frequency = 25_000_000        # uint
# Timer interrupt num.
timer-irq = "0x8000_0000_0000_0005" # uint
# Uart Physical Address
uart-paddr = 0x04140000     # uint
